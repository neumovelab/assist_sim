device:
  name: "DephyExoBootL1"
  model_xml: "L1model.xml"

attachments:
  # Pelvis
  - device_body: "fanny_pack"
    parent_body: "pelvis"
  # Tibia R
  - device_body: "exo_1_r"
    parent_body: "tibia_r"
  - device_body: "tb_shank_r"
    parent_body: "tibia_r"
  # Calcn R
  - device_body: "tb_mid_r"
    parent_body: "calcn_r"
  - device_body: "exo_2_r"
    parent_body: "calcn_r"
  # Toes R
  - device_body: "tb_toe_r"
    parent_body: "toes_r"
  # Tibia L
  - device_body: "exo_1_l"
    parent_body: "tibia_l"
  - device_body: "tb_shank_l"
    parent_body: "tibia_l"
  # Calcn L
  - device_body: "tb_mid_l"
    parent_body: "calcn_l"
  - device_body: "exo_2_l"
    parent_body: "calcn_l"
  # Toes L
  - device_body: "tb_toe_l"
    parent_body: "toes_l"

joint_overrides:
  - name: "ankle_angle_r"
    range: [-0.45, 0.349]
    damping: 0.5
  - name: "mtp_angle_r"
    range: [-0.0145, 0.2]
    damping: 0.5
  - name: "ankle_angle_l"
    range: [-0.45, 0.349]
    damping: 0.5
  - name: "mtp_angle_l"
    range: [-0.0145, 0.2]
    damping: 0.5

actuators:
  - name: "Exo_R"
    type: "general"
    joint: "ankle_angle_r"
    gaintype: "fixed"
    gainprm: [100, 0, 0]
    biastype: "none"
    biasprm: [0, 0, 0]
    dyntype: "none"
    dynprm: [1, 0, 0]
    ctrlrange: [-1, 0]
    ctrllimited: true
    gear: [1.0]
  - name: "Exo_L"
    type: "general"
    joint: "ankle_angle_l"
    gaintype: "fixed"
    gainprm: [100, 0, 0]
    biastype: "none"
    biasprm: [0, 0, 0]
    dyntype: "none"
    dynprm: [1, 0, 0]
    ctrlrange: [-1, 0]
    ctrllimited: true
    gear: [1.0]

keyframe_overrides:
  stand:
    pelvis_ty: 0.96
  walk_left:
    pelvis_ty: 0.93285
  walk_right:
    pelvis_ty: 0.93285
  squat:
    pelvis_ty: 0.77
  lunge:
    pelvis_ty: 0.72
