name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install assist_sim + dev deps
        # myo_sim is intentionally NOT installed here -- the suite has 24
        # tests gated with @needs_myo_sim that skip gracefully. Once myo_sim
        # is published / git-installable in a stable form, add a second lane
        # to this matrix that installs it and runs the full suite.
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest -q --tb=short

      - name: Verify package builds cleanly
        if: matrix.python-version == '3.12'
        run: |
          pip install build
          python -m build --wheel
          python -c "
          import zipfile
          with zipfile.ZipFile('dist/assist_sim-0.1.0-py3-none-any.whl') as z:
              names = z.namelist()
          assert any(n.endswith('.yaml') for n in names), 'device YAMLs missing from wheel'
          assert any(n.endswith('.stl') for n in names), 'mesh STLs missing from wheel'
          assert 'assist_sim/py.typed' in names, 'py.typed marker missing'
          print(f'Wheel OK: {len(names)} files')
          "
